<h1>Ordenar AirPods Pro 2</h1>

<p>Completa tus datos para realizar tu pedido.</p>

<form onsubmit="enviarPedido(); return false;">

<input type="text" id="direccion" placeholder="Dirección de entrega" required><br>

<input type="text" id="telefono" placeholder="Número de teléfono" required><br>

<button type="submit">Enviar pedido por WhatsApp</button>

</form>

<script>

function enviarPedido(){

let nombre = document.getElementById("nombre").value;
let direccion = document.getElementById("direccion").value;
let telefono = document.getElementById("telefono").value;

/* 🟢 AQUI PONES TU NUMERO DE WHATSAPP */

let numero = "50232919353";

let mensaje =
"Nuevo pedido Cash Drop GT:%0A%0A" +
"Nombre: " + nombre + "%0A" +
"Dirección: " + direccion + "%0A" +
"Telefono: " + telefono + "%0A%0A" +
"Producto: AirPods Pro 2";

let url = "https://wa.me/" + numero + "?text=" + mensaje;

window.open(url);

}
